server:
  port: 8081

spring:
  application:
    name: userservice

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8089/realms/boxoffice-realm

  cloud:
    compatibility-verifier:
      enabled: false

  # 1. PostgreSQL DB 연결
  datasource:
    url: jdbc:postgresql://localhost:5432/${DB_NAME:sparta_logistics}?currentSchema=user_schema
    username: ${DB_USERNAME:sparta_admin}
    password: ${DB_PASSWORD:password123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # 2. Redis 연결
  data:
    redis:
      host: localhost
      port: 6379

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/