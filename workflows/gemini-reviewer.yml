name: Gemini PR Code Reviewer

on:
  pull_request:
    types: [opened, synchronize] # PR이 처음 열리거나 추가 코드가 push될 때 실행

permissions:
  contents: read
  pull-requests: write # PR에 AI가 직접 댓글을 달 수 있도록 권한 부여

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      # 1. 원격 저장소 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 파이썬 환경 세팅
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 변경된 코드(Diff) 추출 및 Gemini API 호출 후 리뷰 작성
      - name: Generate Code Review with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: |
          python -c '
          import os, json, urllib.request, subprocess

          # PR 대상 브랜치와 현재 브랜치 간의 코드 변경점(Diff) 추출
          base_ref = os.environ["GITHUB_BASE_REF"]
          subprocess.run(["git", "fetch", "origin", base_ref])
          diff_target = f"origin/{base_ref}...HEAD"
          diff_output = subprocess.check_output(["git", "diff", diff_target]).decode("utf-8", errors="ignore")

          if not diff_output.strip():
              with open("review.txt", "w") as f: f.write("변경된 코드 정보가 없어 리뷰를 진행하지 않았습니다.")
              exit(0)

          # Gemini API 요청 페이로드 구성
          api_key = os.environ["GEMINI_API_KEY"]
          url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key={api_key}"
          
          prompt = (
              "당신은 전 세계 최고의 소프트웨어 아키텍트이자 Spring Boot 백엔드 시니어 개발자입니다. "
              "아래 제공되는 모노레포 프로젝트의 Git Diff 내용을 정밀 분석하여 코드 리뷰를 작성해 주세요.\n\n"
              "리뷰 규칙:\n"
              "1. 어떤 서비스 모듈(예: user-service, api-gateway 등)의 어떤 파일이 변경되었는지 인지하고 언급해 주세요.\n"
              "2. 가독성, 버그 가능성, 예외 처리 누락, 성능 최적화 관점에서 비판적이고 건설적인 피드백을 주세요.\n"
              "3. 반드시 한국어로 친절하고 정중하게 마크다운(Markdown) 형태로 답변해 주세요.\n\n"
              f"Code Diff:\n{diff_output}"
          )

          payload = {"contents": [{"parts": [{"text": prompt}]}]}
          req = urllib.request.Request(url, data=json.dumps(payload).encode("utf-8"), headers={"Content-Type": "application/json"})

          # API 전송 및 결과 저장
          try:
              with urllib.request.urlopen(req) as res:
                  response_data = json.loads(res.read().decode("utf-8"))
                  review_text = response_data["candidates"][0]["content"]["parts"][0]["text"]
          except Exception as e:
              review_text = f"Gemini API 호출 중 에러가 발생했습니다: {str(e)}"

          with open("review.txt", "w", encoding="utf-8") as f:
              f.write("## 🤖 Gemini AI의 실시간 코드 리뷰 리포트\n\n" + review_text)
          '

      # 4. 생성된 리뷰 파일을 읽어 깃허브 PR 창에 자동으로 댓글 게시
      - name: Post comment on PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body-file=review.txt