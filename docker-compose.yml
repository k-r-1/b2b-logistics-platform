services:
  postgres-db:
    image: postgres:15-alpine
    container_name: sparta-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./docker_data/postgres:/var/lib/postgresql/data

  redis-cache:
    image: redis:7-alpine
    container_name: sparta-redis
    ports:
      - "6379:6379"

  kafka:
    image: apache/kafka:3.7.0
    container_name: sparta-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  # ─── 여기 아래부터 우리 애플리케이션 코드를 도커로 연결하는 설정입니다 ───
  
  eureka-server:
    build: ./eureka-server
    container_name: boxoffice-eureka
    ports:
      - "8761:8761"

  api-gateway:
    build: ./api-gateway
    container_name: boxoffice-gateway
    ports:
      - "8080:8080"
    env_file:
      - ./.env
    depends_on:
      - eureka-server

  user-service:
    build: ./user-service
    container_name: boxoffice-user-service
    ports:
      - "8081:8081"
    env_file:
      - ./.env
    depends_on:
      - eureka-server
      - postgres-db

  hub-service:
    build: ./hub-service
    container_name: boxoffice-hub-service
    ports:
      - "8083:8083"
    env_file:
      - ./.env
    environment:
      - DB_HOST=postgres-db
    depends_on:
      - eureka-server
      - postgres-db
      - redis-cache
        
  company-service:
    build: ./company-service
    container_name: boxoffice-company-service
    ports:
      - "8082:8082"
    env_file:
      - ./.env
    environment:
      - DB_HOST=postgres-db
      - REDIS_HOST=redis-cache
    depends_on:
      - eureka-server
      - postgres-db
      - redis-cache
        
  order-service:
    build: ./order-service
    container_name: boxoffice-order
    ports:
      - "8084:8084"
    env_file:
      - ./.env
    environment:
      - DB_HOST=postgres-db
    depends_on:
      - eureka-server
      - postgres-db
      - redis-cache

  # 6. 배송 담당자 서비스
  delivery-manager-service:
    build: ./delivery-manager-service
    container_name: boxoffice-delivery-manager
    ports:
      - "8086:8086"
    env_file:
      - ./.env
    depends_on:
      - eureka-server
      - postgres-db

  # 7. 배송 서비스
  delivery-service:
    build: ./delivery-service
    container_name: boxoffice-delivery-service
    ports:
      - "8085:8085"
    env_file:
      - ./.env
    depends_on:
      - eureka-server
      - postgres-db

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.0
    container_name: boxoffice-keycloak
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: boxoffice123
      KC_HTTP_RELATIVE_PATH: /
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8089:8080"
    volumes:
      - ./docker_data/keycloak:/opt/keycloak/data
      - ./keycloak/import:/opt/keycloak/data/import
    depends_on:
      - postgres-db
