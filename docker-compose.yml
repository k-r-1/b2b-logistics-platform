services:
  postgres-db:
    image: postgres:15-alpine
    container_name: sparta-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data

  redis-cache:
    image: redis:7-alpine
    container_name: sparta-redis
    ports:
      - "6379:6379"

  # ─── 여기 아래부터 우리 애플리케이션 코드를 도커로 연결하는 설정입니다 ───
  
  eureka-server:
    build: ./eurekaserver
    container_name: boxoffice-eureka
    ports:
      - "8761:8761"
    environment:
      # ★ 도커 환경에서도 호환성 검사를 강제로 꺼버리는 핵심 치트키 옵션입니다.
      - SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED=false

  api-gateway:
    build: ./apigateway
    container_name: boxoffice-gateway
    ports:
      - "8080:8080"
    env_file:
      - ./.env
    depends_on:
      - eureka-server
    environment:
      # ★ 도커 환경에서도 호환성 검사를 강제로 꺼버리는 핵심 치트키 옵션입니다.
      - SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED=false

  user-service:
    build: ./userservice
    container_name: boxoffice-user-service
    ports:
      - "8081:8081"
    env_file:
      - ./.env
    depends_on:
      - eureka-server
      - postgres-db
    environment:
      # ★ 도커 환경에서도 호환성 검사를 강제로 꺼버리는 핵심 치트키 옵션입니다.
      - SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED=false

  # 6. 배송 담당자 서비스
  delivery-manager-service:
    build: ./deliverymanagerservice
    container_name: boxoffice-delivery-manager
    ports:
      - "8086:8086"
    env_file:
      - ./.env
    depends_on:
      - eureka-server
      - postgres-db
    environment:
      # ★ 도커 환경에서도 호환성 검사를 강제로 꺼버리는 핵심 치트키 옵션입니다.
      - SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED=false

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.0
    container_name: boxoffice-keycloak
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HTTP_PORT: 8080
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    ports:
      - "8089:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
    depends_on:
      - postgres-db

volumes:
  postgres_data:
  keycloak_data: