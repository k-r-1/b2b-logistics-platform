name: CI - Main

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: ci-main-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  pull-requests: write
  contents: read

jobs:
  detect-changes:
    name: "변경 서비스 감지"
    runs-on: ubuntu-latest
    outputs:
      # 새 서비스 추가 시 추가 부분 1
      common:                   ${{ steps.filter.outputs.common }}
      api-gateway:              ${{ steps.filter.outputs.api-gateway }}
      delivery_manager_service: ${{ steps.filter.outputs.delivery_manager_service }}
      eureka-server:            ${{ steps.filter.outputs.eureka-server }}
      user-service:             ${{ steps.filter.outputs.user-service }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: '1'

      - name: 변경된 서비스 디렉토리 감지
        uses: dorny/paths-filter@v3
        id: filter
        with:
          # 새 서비스 추가 시 추가 부분 2
          filters: |
            common:
              - 'common/**'
            api-gateway:
              - 'api-gateway/**'
            delivery_manager_service:
              - 'delivery_manager_service/**'
            eureka-server:
              - 'eureka-server/**'
            user-service:
              - 'user-service/**'


  ci-api-gateway:
    needs: detect-changes
    uses: ./.github/workflows/_service-ci.yml
    secrets: inherit
    permissions:
      pull-requests: write
      contents: read
    with:
      service: api-gateway
      changed: ${{ needs.detect-changes.outputs['api-gateway'] }}
      common-changed: ${{ needs.detect-changes.outputs.common }}
      run-integration-test: true

  ci-delivery-manager:
    needs: detect-changes
    uses: ./.github/workflows/_service-ci.yml
    secrets: inherit
    permissions:
      pull-requests: write
      contents: read
    with:
      service: delivery_manager_service
      changed: ${{ needs.detect-changes.outputs.delivery_manager_service }}
      common-changed: ${{ needs.detect-changes.outputs.common }}
      run-integration-test: true

  ci-eureka-server:
    needs: detect-changes
    uses: ./.github/workflows/_service-ci.yml
    secrets: inherit
    permissions:
      pull-requests: write
      contents: read
    with:
      service: eureka-server
      changed: ${{ needs.detect-changes.outputs['eureka-server'] }}
      common-changed: ${{ needs.detect-changes.outputs.common }}
      run-integration-test: true

  ci-user-service:
    needs: detect-changes
    uses: ./.github/workflows/_service-ci.yml
    secrets: inherit
    permissions:
      pull-requests: write
      contents: read
    with:
      service: user-service
      changed: ${{ needs.detect-changes.outputs['user-service'] }}
      common-changed: ${{ needs.detect-changes.outputs.common }}
      run-integration-test: true


  ci-result:
    name: "결과지 생성중"
    runs-on: ubuntu-latest
    if: always()
    needs:
      - detect-changes
      - ci-api-gateway
      - ci-delivery-manager
      - ci-eureka-server
      - ci-user-service
      # 새 서비스 추가 시 변경 4

    steps:
      - name: CI 성공/실패 판정 + Discord 알림
        if: always()
        shell: bash
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_MAIN_WEBHOOK }}
          OUT_COMMON: ${{ needs.detect-changes.outputs.common }}
          OUT_GW: ${{ needs.detect-changes.outputs['api-gateway'] }}
          OUT_DM: ${{ needs.detect-changes.outputs.delivery_manager_service }}
          OUT_EU: ${{ needs.detect-changes.outputs['eureka-server'] }}
          OUT_US: ${{ needs.detect-changes.outputs['user-service'] }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          R_DETECT: ${{ needs.detect-changes.result }}
          R_GW: ${{ needs.ci-api-gateway.result }}
          R_DM: ${{ needs.ci-delivery-manager.result }}
          R_EU: ${{ needs.ci-eureka-server.result }}
          R_US: ${{ needs.ci-user-service.result }}
        run: |
          job_emoji() {
            case "$1" in
              success)   echo "✅" ;;
              failure)   echo "❌" ;;
              cancelled) echo "⚠️" ;;
              skipped)   echo "⏭️" ;;
              *)         echo "❓" ;;
            esac
          }
          
          # CI 성공/실패 판정
          FAILED=false
          for result in "$R_DETECT" "$R_GW" "$R_DM" "$R_EU" "$R_US"; do
            [[ "$result" == "failure" || "$result" == "cancelled" ]] && FAILED=true
          done
          
          [[ "$FAILED" == "true" ]] \
            && COLOR=15548997 && TITLE="❌  CI Failed — MAIN CI" \
            || COLOR=5763719  && TITLE="✅  CI Passed — MAIN CI"
          
          # 변경된 서비스 목록
          SERVICES=""
          append() { [[ "$1" == "true" ]] && SERVICES="${SERVICES:+$SERVICES,}$2"; }
          append "$OUT_COMMON" "common"
          append "$OUT_GW"     "api-gateway"
          append "$OUT_DM"     "delivery_manager_service"
          append "$OUT_EU"     "eureka-server"
          append "$OUT_US"     "user-service"
          
          if [[ -z "$SERVICES" ]]; then
            SERVICE_LIST="변경된 서비스 없음"
          else
            SERVICE_LIST=$(echo "$SERVICES" | tr ',' '\n' | sed 's/^/• /' | awk '{printf "%s\\n", $0}' | sed 's/\\n$//')
          fi
          
          # Discord 전송
          PAYLOAD=$(cat <<EOF
          {
            "username": "GitHub Actions",
            "avatar_url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
            "embeds": [{
              "title": "${TITLE}",
              "url": "${RUN_URL}",
              "color": ${COLOR},
              "fields": [
                {"name":"📌 PR",           "value":"[${PR_TITLE}](${PR_URL})","inline":false},
                {"name":"👤 작성자",        "value":"${PR_AUTHOR}",           "inline":true},
                {"name":"🔀 대상 브랜치",   "value":"main",                    "inline":true},
                {"name":"📦 변경된 서비스", "value":"${SERVICE_LIST}",        "inline":false},
                {"name":"📋 Job 결과",      "value":"$(job_emoji $R_DETECT) detect-changes\n$(job_emoji $R_GW) ci-api-gateway\n$(job_emoji $R_DM) ci-delivery-manager\n$(job_emoji $R_EU) ci-eureka-server\n$(job_emoji $R_US) ci-user-service","inline":false}
              ],
              "footer":{"text":"Run #${{ github.run_number }} • ${{ github.repository }}"},
              "timestamp":"$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }]
          }
          EOF
          )
          
          HTTP_STATUS=$(curl -s -o /tmp/res.txt -w "%{http_code}" \
            -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          
          cat /tmp/res.txt
          [[ "$HTTP_STATUS" -ge 200 && "$HTTP_STATUS" -lt 300 ]] \
            && echo "Discord 알림 완료" \
            || { echo "Discord 전송 실패 (HTTP $HTTP_STATUS)"; exit 1; }

      - name: 최종 CI 상태 확인
        run: |
          FAILED=false
          for result in \
            "${{ needs.detect-changes.result }}" \
            "${{ needs.ci-api-gateway.result }}" \
            "${{ needs.ci-delivery-manager.result }}" \
            "${{ needs.ci-eureka-server.result }}" \
            "${{ needs.ci-user-service.result }}"; do
            [[ "$result" == "failure" || "$result" == "cancelled" ]] && FAILED=true
          done
          [[ "$FAILED" == "true" ]] \
            && { echo "CI 실패 — 코드를 다시 확인해주세요."; exit 1; } \
            || echo "CI SUCCESS"
