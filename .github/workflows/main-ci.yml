name: CI - Main

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: ci-main-${{ github.event.pull_request.number }}
  cancel-in-progress: false

env:
  JAVA_VERSION: '21'
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"


jobs:
  detect-changes:
    name: 변경된 서비스를 확인합니다.
    runs-on: ubuntu-latest
    outputs:
      common:                   ${{ steps.filter.outputs.common }}
      api-gateway:              ${{ steps.filter.outputs.api-gateway }}
      delivery_manager_service: ${{ steps.filter.outputs.delivery_manager_service }}
      eureka-server:            ${{ steps.filter.outputs.eureka-server }}
      user-service:             ${{ steps.filter.outputs.user-service }}
      # 새 서비스 추가 시 outputs 항목을 추가하세요.

    steps:
      - name: 코드 확인
        uses: actions/checkout@v4

      - name: 변경 경로 확인
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            common:
              - 'common/**'
            api-gateway:
              - 'api-gateway/**'
            delivery_manager_service:
              - 'delivery_manager_service/**'
            eureka-server:
              - 'eureka-server/**'
            user-service:
              - 'user-service/**'

  

  checkstyle:
    name: 린트 체크 - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-changes

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            changed: ${{ needs.detect-changes.outputs['api-gateway'] }}
          - service: delivery_manager_service
            changed: ${{ needs.detect-changes.outputs.delivery_manager_service }}
          - service: eureka-server
            changed: ${{ needs.detect-changes.outputs['eureka-server'] }}
          - service: user-service
            changed: ${{ needs.detect-changes.outputs['user-service'] }}
          # 새 서비스 추가 시 matrix 항목을 추가하세요.

    steps:
      - name: 코드 확인
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Run Checkstyle
        if: matrix.changed == 'true' || needs.detect-changes.outputs.common == 'true'
        run: |
          ./gradlew :${{ matrix.service }}:checkstyleMain \
            --no-daemon \
            --continue \
            --stacktrace

      - name: Upload Checkstyle report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-report-${{ matrix.service }}
          path: ${{ matrix.service }}/build/reports/checkstyle/
          retention-days: 14


  unit-test:
    name: 단위 테스트 - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [detect-changes, checkstyle]

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            changed: ${{ needs.detect-changes.outputs['api-gateway'] }}
          - service: delivery_manager_service
            changed: ${{ needs.detect-changes.outputs.delivery_manager_service }}
          - service: eureka-server
            changed: ${{ needs.detect-changes.outputs['eureka-server'] }}
          - service: user-service
            changed: ${{ needs.detect-changes.outputs['user-service'] }}
          # 새 서비스 추가 시 matrix 항목을 추가하세요.

    steps:
      - name: 코드 확인
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: 단위 테스트 수행
        if: matrix.changed == 'true' || needs.detect-changes.outputs.common == 'true'
        run: |
          ./gradlew :${{ matrix.service }}:test \
            --no-daemon \
            -x checkstyleMain \
            -x checkstyleTest

      - name: 결과 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-${{ matrix.service }}
          path: ${{ matrix.service }}/build/reports/tests/test/
          retention-days: 14

  integration-test:
    name: 통합테스트 (Docker) - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [detect-changes, unit-test]

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            changed: ${{ needs.detect-changes.outputs['api-gateway'] }}
          - service: delivery_manager_service
            changed: ${{ needs.detect-changes.outputs.delivery_manager_service }}
          - service: eureka-server
            changed: ${{ needs.detect-changes.outputs['eureka-server'] }}
          - service: user-service
            changed: ${{ needs.detect-changes.outputs['user-service'] }}
          # 새 서비스 추가 시 matrix 항목을 추가하세요.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'


      - name: docker compose 로 헬스 체크
        if: needs.detect-changes.outputs[matrix.service] == 'true' || needs.detect-changes.outputs.common == 'true'
        run: |
          docker compose -f docker-compose.test.yml up -d --wait
          echo "모든 컨테이너가 healthy 합니다 ! "

      # 통합 테스트의 경우 *IntegrationTest 로 컨벤션을 준수해주세요.
      - name: Run integration tests
        run: |
          ./gradlew :${{ matrix.service }}:test \
            --tests "*IntegrationTest" \
            --no-daemon \
            -x checkstyleMain \
            -x checkstyleTest
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/testdb
          SPRING_DATASOURCE_USERNAME: testuser
          SPRING_DATASOURCE_PASSWORD: testpass
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379

      - name: 결과를 올립니다.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results-${{ matrix.service }}
          path: ${{ matrix.service }}/build/reports/tests/test/
          retention-days: 30

      - name: Docker Compose 제거 중 . . .
        if: always()
        run: docker compose -f docker-compose.test.yml down -v



  ci-result:
    name: CI 결과지 생성중 ...
    runs-on: ubuntu-latest
    if: always()
    needs:
      - detect-changes
      - checkstyle
      - unit-test
      - integration-test

    steps:
      - name: Evaluate CI result
        id: evaluate
        run: |
          if [[ \
            "${{ needs.detect-changes.result }}"   == "failure"   || \
            "${{ needs.detect-changes.result }}"   == "cancelled" || \
            "${{ needs.checkstyle.result }}"       == "failure"   || \
            "${{ needs.checkstyle.result }}"       == "cancelled" || \
            "${{ needs.unit-test.result }}"        == "failure"   || \
            "${{ needs.unit-test.result }}"        == "cancelled" || \
            "${{ needs.integration-test.result }}" == "failure"   || \
            "${{ needs.integration-test.result }}" == "cancelled" \
          ]]; then
            echo "ci_status=failure" >> $GITHUB_OUTPUT
          else
            echo "ci_status=success" >> $GITHUB_OUTPUT
          fi

      - name: Collect changed services
        id: services
        run: |
          SERVICES=""
          append() {
            [[ "$1" == "true" ]] && SERVICES="${SERVICES:+$SERVICES,}$2"
          }
          append "${{ needs.detect-changes.outputs.common }}"                   "common"
          append "${{ needs.detect-changes.outputs['api-gateway'] }}"           "api-gateway"
          append "${{ needs.detect-changes.outputs.delivery_manager_service }}" "delivery_manager_service"
          append "${{ needs.detect-changes.outputs['eureka-server'] }}"         "eureka-server"
          append "${{ needs.detect-changes.outputs['user-service'] }}"          "user-service"
          # <PLACEHOLDER> 새 서비스 추가 시 append 줄을 추가하세요.

          echo "list=${SERVICES:-none}" >> $GITHUB_OUTPUT

      - name: Send Discord notification
        if: always()
        shell: bash
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_MAIN_WEBHOOK }}
          CI_STATUS:    ${{ steps.evaluate.outputs.ci_status }}
          CHANGED_SVCS: ${{ steps.services.outputs.list }}
          PR_TITLE:     ${{ github.event.pull_request.title }}
          PR_AUTHOR:    ${{ github.event.pull_request.user.login }}
          PR_URL:       ${{ github.event.pull_request.html_url }}
          RUN_URL:      ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          R_DETECT:     ${{ needs.detect-changes.result }}
          R_STYLE:      ${{ needs.checkstyle.result }}
          R_UNIT:       ${{ needs.unit-test.result }}
          R_INTEGRATION: ${{ needs.integration-test.result }}
        run: |
          job_emoji() {
            case "$1" in
              success)   echo "✅" ;;
              failure)   echo "❌" ;;
              cancelled) echo "⚠️" ;;
              skipped)   echo "⏭️" ;;
              *)         echo "❓" ;;
            esac
          }

          [[ "$CI_STATUS" == "success" ]] \
            && COLOR=5763719 && TITLE="MAIN CI 가 성공했습니다." \
            || COLOR=15548997 && TITLE="MAIN CI 가 실패했습니다 ❌"

          if [[ -z "$CHANGED_SVCS" || "$CHANGED_SVCS" == "none" ]]; then
            SERVICE_LIST="변경된 서비스 없음"
          else
            SERVICE_LIST=$(echo "$CHANGED_SVCS" | tr ',' '\n' | sed 's/^/• /' | paste -sd '\n')
          fi

          FAILED_LINKS=""
          [[ "$R_DETECT"      == "failure" ]] && FAILED_LINKS="${FAILED_LINKS}• [detect-changes 로그](${RUN_URL})\n"
          [[ "$R_STYLE"       == "failure" ]] && FAILED_LINKS="${FAILED_LINKS}• [checkstyle 로그](${RUN_URL})\n"
          [[ "$R_UNIT"        == "failure" ]] && FAILED_LINKS="${FAILED_LINKS}• [unit-test 로그](${RUN_URL})\n"
          [[ "$R_INTEGRATION" == "failure" ]] && FAILED_LINKS="${FAILED_LINKS}• [integration-test 로그](${RUN_URL})\n"

          if [[ -n "$FAILED_LINKS" ]]; then
            FAILED_FIELD=",{\"name\":\"🔗 실패한 Job 로그\",\"value\":\"${FAILED_LINKS}\",\"inline\":false}"
          else
            FAILED_FIELD=""
          fi

          PAYLOAD=$(cat <<EOF
          {
            "username": "GitHub Actions",
            "avatar_url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
            "embeds": [{
              "title": "${TITLE}",
              "url": "${RUN_URL}",
              "color": ${COLOR},
              "fields": [
                {"name":"📌 PR","value":"[${PR_TITLE}](${PR_URL})","inline":false},
                {"name":"👤 작성자","value":"${PR_AUTHOR}","inline":true},
                {"name":"🔀 대상 브랜치","value":"main","inline":true},
                {"name":"📦 변경된 서비스","value":"${SERVICE_LIST}","inline":false},
                {"name":"📋 Job 결과","value":"$(job_emoji $R_DETECT) detect-changes\n$(job_emoji $R_STYLE) checkstyle\n$(job_emoji $R_UNIT) unit-test\n$(job_emoji $R_INTEGRATION) integration-test","inline":false}
                ${FAILED_FIELD}
              ],
              "footer":{"text":"Run #${{ github.run_number }} • ${{ github.repository }}"},
              "timestamp":"$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }]
          }
          EOF
          )

          HTTP_STATUS=$(curl -s -o /tmp/res.txt -w "%{http_code}" \
            -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          cat /tmp/res.txt
          [[ "$HTTP_STATUS" -ge 200 && "$HTTP_STATUS" -lt 300 ]] \
            && echo "✅ Discord 알림 전송 완료" \
            || { echo "❌ 전송 실패 (HTTP $HTTP_STATUS)"; exit 1; }

      - name: Final status check
        run: |
          [[ "${{ steps.evaluate.outputs.ci_status }}" == "success" ]] \
            && echo "🎉 CI Main Passed — safe to merge!" \
            || { echo "❌ CI Main Failed — merge blocked."; exit 1; }