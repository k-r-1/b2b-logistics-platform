name: CI - Main

on:
  push:
    branches:
      - main
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: ci-main-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  pull-requests: write
  contents: read

jobs:
  detect-changes:
    name: "변경 서비스 감지"
    runs-on: ubuntu-latest
    outputs:
      # 새 서비스 추가 시 추가 부분 1
      common:                   ${{ steps.filter.outputs.common }}
      api-gateway:              ${{ steps.filter.outputs.api-gateway }}
      delivery_manager_service: ${{ steps.filter.outputs.delivery_manager_service }}
      eureka-server:            ${{ steps.filter.outputs.eureka-server }}
      user-service:             ${{ steps.filter.outputs.user-service }}
      hub-service: ${{ steps.filter.outputs.hub-service }}
      company-service: ${{ steps.filter.outputs.company-service }}
      order-service: ${{ steps.filter.outputs.order-service }}
      delivery-service: ${{ steps.filter.outputs.delivery-service }}
      ai-notification-service: ${{ steps.filter.outputs.ai-notification-service }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: '1'

      - name: 변경된 서비스 디렉토리 감지
        uses: dorny/paths-filter@v3
        id: filter
        with:
          # 새 서비스 추가 시 추가 부분 2
          filters: |
            common:
              - 'common/**'
            api-gateway:
              - 'api-gateway/**'
            delivery_manager_service:
              - 'delivery_manager_service/**'
            eureka-server:
              - 'eureka-server/**'
            user-service:
              - 'user-service/**'
            hub-service:
              - 'hub-service/**'
            company-service:
              - 'company-service/**'
            order-service:
              - 'order-service/**'
            delivery-service:
              - 'delivery-service/**'
            ai-notification-service:
              - 'ai-notification-service/**'


  ci-api-gateway:
    needs: detect-changes
    uses: ./.github/workflows/_service-ci.yml
    secrets: inherit
    permissions:
      pull-requests: write
      contents: read
    with:
      service: api-gateway
      changed: ${{ needs.detect-changes.outputs['api-gateway'] }}
      common-changed: ${{ needs.detect-changes.outputs.common }}
      run-integration-test: true

  ci-delivery-manager:
    needs: detect-changes
    uses: ./.github/workflows/_service-ci.yml
    secrets: inherit
    permissions:
      pull-requests: write
      contents: read
    with:
      service: delivery_manager_service
      changed: ${{ needs.detect-changes.outputs.delivery_manager_service }}
      common-changed: ${{ needs.detect-changes.outputs.common }}
      run-integration-test: true

  ci-eureka-server:
    needs: detect-changes
    uses: ./.github/workflows/_service-ci.yml
    secrets: inherit
    permissions:
      pull-requests: write
      contents: read
    with:
      service: eureka-server
      changed: ${{ needs.detect-changes.outputs['eureka-server'] }}
      common-changed: ${{ needs.detect-changes.outputs.common }}
      run-integration-test: true

  ci-user-service:
    needs: detect-changes
    uses: ./.github/workflows/_service-ci.yml
    secrets: inherit
    permissions:
      pull-requests: write
      contents: read
    with:
      service: user-service
      changed: ${{ needs.detect-changes.outputs['user-service'] }}
      common-changed: ${{ needs.detect-changes.outputs.common }}
      run-integration-test: true

  ci-hub-service:
    needs: detect-changes
    uses: ./.github/workflows/_service-ci.yml
    secrets: inherit
    permissions:
      pull-requests: write
      contents: read
    with:
      service: hub-service
      changed: ${{ needs.detect-changes.outputs['hub-service'] }}
      common-changed: ${{ needs.detect-changes.outputs.common }}
      run-integration-test: true

  ci-company-service:
    needs: detect-changes
    uses: ./.github/workflows/_service-ci.yml
    secrets: inherit
    permissions:
      pull-requests: write
      contents: read
    with:
      service: company-service
      changed: ${{ needs.detect-changes.outputs['company-service'] }}
      common-changed: ${{ needs.detect-changes.outputs.common }}
      # company-service는 통합테스트(*IntegrationTest)가 없어 단위테스트만 실행
      run-integration-test: false

  ci-order-service:
    needs: detect-changes
    uses: ./.github/workflows/_service-ci.yml
    secrets: inherit
    permissions:
      pull-requests: write
      contents: read
    with:
      service: order-service
      changed: ${{ needs.detect-changes.outputs['order-service'] }}
      common-changed: ${{ needs.detect-changes.outputs.common }}
      run-integration-test: true

  ci-delivery-service:
    needs: detect-changes
    uses: ./.github/workflows/_service-ci.yml
    secrets: inherit
    permissions:
      pull-requests: write
      contents: read
    with:
      service: delivery-service
      changed: ${{ needs.detect-changes.outputs['delivery-service'] }}
      common-changed: ${{ needs.detect-changes.outputs.common }}
      run-integration-test: true

  ci-ai-notification-service:
    needs: detect-changes
    uses: ./.github/workflows/_service-ci.yml
    secrets: inherit
    permissions:
      pull-requests: write
      contents: read
    with:
      service: ai-notification-service
      changed: ${{ needs.detect-changes.outputs['ai-notification-service'] }}
      common-changed: ${{ needs.detect-changes.outputs.common }}
      run-integration-test: true


  ci-result:
    name: "결과지 생성중"
    runs-on: ubuntu-latest
    if: always()
    needs:
      - detect-changes
      - ci-api-gateway
      - ci-delivery-manager
      - ci-eureka-server
      - ci-user-service
      - ci-hub-service
      - ci-company-service
      - ci-order-service
      - ci-delivery-service
      - ci-ai-notification-service

    steps:
      - name: 최종 CI 상태 확인
        run: |
          FAILED=false
          for result in \
            "${{ needs.detect-changes.result }}" \
            "${{ needs.ci-api-gateway.result }}" \
            "${{ needs.ci-delivery-manager.result }}" \
            "${{ needs.ci-eureka-server.result }}" \
            "${{ needs.ci-user-service.result }}" \
            "${{ needs.ci-hub-service.result }}" \
            "${{ needs.ci-company-service.result }}" \
            "${{ needs.ci-order-service.result }}" \
            "${{ needs.ci-delivery-service.result }}" \
            "${{ needs.ci-ai-notification-service.result }}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              FAILED=true
            fi
          done

          if [[ "$FAILED" == "true" ]]; then
            echo "❌ CI 실패 — 코드를 다시 확인해주세요."
            exit 1
          else
            echo "✅ CI SUCCESS"
          fi
