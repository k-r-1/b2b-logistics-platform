# 새 서비스 추가 시 수정할 위치 3곳:
#   1. detect-changes.outputs  에 출력 변수 추가
#   2. paths-filter.filters    에 경로 패턴 추가
#   3. 하단에 ci-<service> Job 블록 복붙 후 이름만 변경
name: CI - Dev

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: ci-dev-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: read

jobs:
  detect-changes:
    name: "detect changes"
    runs-on: ubuntu-latest
    outputs:
      # 서비스 추가 시 변경 1
      common:                   ${{ steps.filter.outputs.common }}
      api-gateway:              ${{ steps.filter.outputs.api-gateway }}
      delivery_manager_service: ${{ steps.filter.outputs.delivery_manager_service }}
      eureka-server:            ${{ steps.filter.outputs.eureka-server }}
      user-service:             ${{ steps.filter.outputs.user-service }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: '1'

      - name: 변경된 서비스 디렉토리 감지
        uses: dorny/paths-filter@v3
        id: filter
        with:
          # 서비스 추가 시 변경 2
          filters: |
            common:
              - 'common/**'
            api-gateway:
              - 'api-gateway/**'
            delivery_manager_service:
              - 'delivery_manager_service/**'
            eureka-server:
              - 'eureka-server/**'
            user-service:
              - 'user-service/**'

  # 새 서비스 추가 시 변경 3
  ci-api-gateway:
    needs: detect-changes
    uses: ./.github/workflows/_service-ci.yml
    secrets: inherit
    permissions:
      pull-requests: write
      contents: read
    with:
      service: api-gateway
      changed: ${{ needs.detect-changes.outputs['api-gateway'] }}
      common-changed: ${{ needs.detect-changes.outputs.common }}

  ci-delivery-manager:
    needs: detect-changes
    uses: ./.github/workflows/_service-ci.yml
    secrets: inherit
    permissions:
      pull-requests: write
      contents: read
    with:
      service: delivery_manager_service
      changed: ${{ needs.detect-changes.outputs.delivery_manager_service }}
      common-changed: ${{ needs.detect-changes.outputs.common }}

  ci-eureka-server:
    needs: detect-changes
    uses: ./.github/workflows/_service-ci.yml
    secrets: inherit
    permissions:
      pull-requests: write
      contents: read
    with:
      service: eureka-server
      changed: ${{ needs.detect-changes.outputs['eureka-server'] }}
      common-changed: ${{ needs.detect-changes.outputs.common }}

  ci-user-service:
    needs: detect-changes
    uses: ./.github/workflows/_service-ci.yml
    secrets: inherit
    permissions:
      pull-requests: write
      contents: read
    with:
      service: user-service
      changed: ${{ needs.detect-changes.outputs['user-service'] }}
      common-changed: ${{ needs.detect-changes.outputs.common }}



  ci-result:
    name: "결과지 생성중"
    runs-on: ubuntu-latest
    if: always()
    needs:
      - detect-changes
      - ci-api-gateway
      - ci-delivery-manager
      - ci-eureka-server
      - ci-user-service
      # 새 서비스 추가 시 변경 4

    steps:
      - name: "[DEBUG] Secret 확인 (테스트 후 삭제)"
        run: |
          if [[ -z "${{ secrets.DISCORD_MAIN_WEBHOOK }}" ]]; then
            echo "❌ DISCORD_MAIN_WEBHOOK 이 비어있습니다"
          else
            echo "✅ DISCORD_MAIN_WEBHOOK 확인됨 (길이: ${#DISCORD_MAIN_WEBHOOK}자)"
          fi
        env:
          DISCORD_MAIN_WEBHOOK: ${{ secrets.DISCORD_MAIN_WEBHOOK }}

      - name: CI 성공/실패 판정
        id: evaluate
        run: |
          echo "📋 Job Results:"
          echo "  detect-changes     : ${{ needs.detect-changes.result }}"
          echo "  ci-api-gateway     : ${{ needs.ci-api-gateway.result }}"
          echo "  ci-delivery-manager: ${{ needs.ci-delivery-manager.result }}"
          echo "  ci-eureka-server   : ${{ needs.ci-eureka-server.result }}"
          echo "  ci-user-service    : ${{ needs.ci-user-service.result }}"

          FAILED=false
          for result in \
            "${{ needs.detect-changes.result }}" \
            "${{ needs.ci-api-gateway.result }}" \
            "${{ needs.ci-delivery-manager.result }}" \
            "${{ needs.ci-eureka-server.result }}" \
            "${{ needs.ci-user-service.result }}"; do
            [[ "$result" == "failure" || "$result" == "cancelled" ]] && FAILED=true
          done

          [[ "$FAILED" == "true" ]] \
            && echo "ci_status=failure" >> $GITHUB_OUTPUT \
            || echo "ci_status=success" >> $GITHUB_OUTPUT

      - name: 변경된 서비스 목록 수집
        id: services
        run: |
          SERVICES=""
          append() {
            [[ "$1" == "true" ]] && SERVICES="${SERVICES:+$SERVICES,}$2"
          }
          append "${{ needs.detect-changes.outputs.common }}"                   "common"
          append "${{ needs.detect-changes.outputs['api-gateway'] }}"           "api-gateway"
          append "${{ needs.detect-changes.outputs.delivery_manager_service }}" "delivery_manager_service"
          append "${{ needs.detect-changes.outputs['eureka-server'] }}"         "eureka-server"
          append "${{ needs.detect-changes.outputs['user-service'] }}"          "user-service"
          # ★ 새 서비스 추가 시 append 줄 추가

          echo "list=${SERVICES:-none}" >> $GITHUB_OUTPUT

      - name: Discord 알림 전송
        if: always()
        shell: bash
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_DEV_WEBHOOK }}
          CI_STATUS:    ${{ steps.evaluate.outputs.ci_status }}
          CHANGED_SVCS: ${{ steps.services.outputs.list }}
          PR_TITLE:     ${{ github.event.pull_request.title }}
          PR_AUTHOR:    ${{ github.event.pull_request.user.login }}
          PR_URL:       ${{ github.event.pull_request.html_url }}
          RUN_URL:      ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          R_DETECT:     ${{ needs.detect-changes.result }}
          R_GW:         ${{ needs.ci-api-gateway.result }}
          R_DM:         ${{ needs.ci-delivery-manager.result }}
          R_EU:         ${{ needs.ci-eureka-server.result }}
          R_US:         ${{ needs.ci-user-service.result }}
        run: |
          job_emoji() {
            case "$1" in
              success)   echo "✅" ;;
              failure)   echo "❌" ;;
              cancelled) echo "⚠️" ;;
              skipped)   echo "⏭️" ;;
              *)         echo "❓" ;;
            esac
          }

          [[ "$CI_STATUS" == "success" ]] \
            && COLOR=5763719  && TITLE="✅  CI Passed — Dev CI" \
            || COLOR=15548997 && TITLE="❌  CI Failed — Dev CI"

          if [[ -z "$CHANGED_SVCS" || "$CHANGED_SVCS" == "none" ]]; then
            SERVICE_LIST="변경된 서비스 없음"
          else
            SERVICE_LIST=$(echo "$CHANGED_SVCS" | tr ',' '\n' | sed 's/^/• /' | awk '{printf "%s\\n", $0}' | sed 's/\\n$//')
          fi

          JOB_RESULTS=$(printf '%s %s\n%s %s\n%s %s\n%s %s\n%s %s' \
            "$(job_emoji $R_DETECT)" "detect-changes" \
            "$(job_emoji $R_GW)"     "ci-api-gateway" \
            "$(job_emoji $R_DM)"     "ci-delivery-manager" \
            "$(job_emoji $R_EU)"     "ci-eureka-server" \
            "$(job_emoji $R_US)"     "ci-user-service" \
            | awk '{printf "%s\\n", $0}' | sed 's/\\n$//')

          FAILED_LINKS=""
          [[ "$R_DETECT" == "failure" ]] && FAILED_LINKS+="• [detect-changes 로그](${RUN_URL})\n"
          [[ "$R_GW"     == "failure" ]] && FAILED_LINKS+="• [api-gateway 로그](${RUN_URL})\n"
          [[ "$R_DM"     == "failure" ]] && FAILED_LINKS+="• [delivery-manager 로그](${RUN_URL})\n"
          [[ "$R_EU"     == "failure" ]] && FAILED_LINKS+="• [eureka-server 로그](${RUN_URL})\n"
          [[ "$R_US"     == "failure" ]] && FAILED_LINKS+="• [user-service 로그](${RUN_URL})\n"

          FAILED_FIELD=""
          [[ -n "$FAILED_LINKS" ]] && \
            FAILED_FIELD=",{\"name\":\"🔗 실패한 Job 로그\",\"value\":\"${FAILED_LINKS}\",\"inline\":false}"

          PAYLOAD=$(cat <<EOF
          {
            "username": "GitHub Actions",
            "avatar_url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
            "embeds": [{
              "title": "${TITLE}",
              "url": "${RUN_URL}",
              "color": ${COLOR},
              "fields": [
                {"name":"📌 PR",           "value":"[${PR_TITLE}](${PR_URL})","inline":false},
                {"name":"👤 작성자",        "value":"${PR_AUTHOR}",           "inline":true},
                {"name":"🔀 대상 브랜치",   "value":"dev",                    "inline":true},
                {"name":"📦 변경된 서비스", "value":"${SERVICE_LIST}",        "inline":false},
                {"name":"📋 Job 결과",      "value":"${JOB_RESULTS}",         "inline":false}
                ${FAILED_FIELD}
              ],
              "footer":{"text":"Run #${{ github.run_number }} • ${{ github.repository }}"},
              "timestamp":"$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }]
          }
          EOF
          )

          HTTP_STATUS=$(curl -s -o /tmp/res.txt -w "%{http_code}" \
            -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          cat /tmp/res.txt
          [[ "$HTTP_STATUS" -ge 200 && "$HTTP_STATUS" -lt 300 ]] \
            && echo "디스코드 알림 완료" \
            || { echo "Discord 전송 실패 (HTTP $HTTP_STATUS)"; exit 1; }

      - name: 최종 CI 상태 확인
        run: |
          [[ "${{ steps.evaluate.outputs.ci_status }}" == "success" ]] \
            && echo "CI SUCCESS" \
            || { echo "CI 실패 — 코드를 다시 확인해주세요."; exit 1; }