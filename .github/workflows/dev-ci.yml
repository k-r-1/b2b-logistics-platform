name: CI - Dev

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: ci-dev-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

permissions:
  pull-requests: write
  contents: read

jobs:
  detect-changes:
    name: PR 에서 변경된 서비스를 감지해 이후 JOB 의 실행 속도를 높입니다.
    runs-on: ubuntu-latest
    outputs:
      common:                   ${{ steps.filter.outputs.common }}
      api-gateway:              ${{ steps.filter.outputs.api-gateway }}
      delivery_manager_service: ${{ steps.filter.outputs.delivery_manager_service }}
      eureka-server:            ${{ steps.filter.outputs.eureka-server }}
      user-service:             ${{ steps.filter.outputs.user-service }}
      # 새 서비스 추가 시 outputs 항목을 추가해야 합니다.
      # new-service: ${{ steps.filter.outputs.new-service }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: '1'

      - name: 변경된 파일이 어느 서비스 디렉토리에 있는지 감지 (새로운 서비스가 들어오면 하단에 추가)
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            common:
              - 'common/**'
            api-gateway:
              - 'api-gateway/**'
            delivery_manager_service:
              - 'delivery_manager_service/**'
            eureka-server:
              - 'eureka-server/**'
            user-service:
              - 'user-service/**'

  checkstyle:
    name: 린트 체크 (테스트 제외) - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-changes

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            changed: ${{ needs.detect-changes.outputs['api-gateway'] }}
          - service: delivery_manager_service
            changed: ${{ needs.detect-changes.outputs.delivery_manager_service }}
          - service: eureka-server
            changed: ${{ needs.detect-changes.outputs['eureka-server'] }}
          - service: user-service
            changed: ${{ needs.detect-changes.outputs['user-service'] }}
          # 새 서비스 추가 시 하단에 항목 추가 필요

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: '1'

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Run Checkstyle
        if: matrix.changed == 'true' || needs.detect-changes.outputs.common == 'true'
        run: |
          ./gradlew :${{ matrix.service }}:checkstyleMain \
            --no-daemon \
            --continue \
            --stacktrace

      - name: checkstyle 위반 시 Actions->실행->Artifacts 에서 확인 가능
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: ignore
          name: checkstyle-report-${{ matrix.service }}
          path: ${{ matrix.service }}/build/reports/checkstyle/
          retention-days: 7

  unit-test:
    name: 단위 테스트 - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [detect-changes, checkstyle]

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            changed: ${{ needs.detect-changes.outputs['api-gateway'] }}
          - service: delivery_manager_service
            changed: ${{ needs.detect-changes.outputs.delivery_manager_service }}
          - service: eureka-server
            changed: ${{ needs.detect-changes.outputs['eureka-server'] }}
          - service: user-service
            changed: ${{ needs.detect-changes.outputs['user-service'] }}
          # 새 서비스 추가 시 matrix 항목을 추가해주세요.


    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: '1'

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: 단위 테스트 실행
        if: matrix.changed == 'true' || needs.detect-changes.outputs.common == 'true'
        run: |
          ./gradlew :${{ matrix.service }}:test \
            --no-daemon \
            -x checkstyleMain \
            -x checkstyleTest

      - name: Jacoco 커버리지 결과
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-${{ matrix.service }}
          path: ${{ matrix.service }}/build/reports/jacoco/test/html/
          retention-days: 3

      - name: 결과를 성공/실패 무관하게 업로드합니다.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: ignore
          name: unit-test-results-${{ matrix.service }}
          path: ${{ matrix.service }}/build/reports/tests/test/
          retention-days: 7

      - name: Jacoco PR Comment
        if: matrix.changed == 'true' || needs.detect-changes.outputs.common == 'true'
        uses: Madrapps/jacoco-report@v1.6.1
        with:
          paths: ${{ matrix.service }}/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 70 # 현재 통과 기준 70입니다.
          min-coverage-changed-files: 70
          title: Jacoco 커버리지 리포트 - ${{ matrix.service }}
          update-comment: true


  ci-result:
    name: CI 결과지 만드는 중 ...
    runs-on: ubuntu-latest
    if: always()
    needs:
      - detect-changes
      - checkstyle
      - unit-test

    steps:
      - name: Evaluate CI result
        id: evaluate
        run: |
          echo "📋 Job Results:"
          echo "  detect-changes : ${{ needs.detect-changes.result }}"
          echo "  checkstyle     : ${{ needs.checkstyle.result }}"
          echo "  unit-test      : ${{ needs.unit-test.result }}"

          if [[ \
            "${{ needs.detect-changes.result }}" == "failure"   || \
            "${{ needs.detect-changes.result }}" == "cancelled" || \
            "${{ needs.checkstyle.result }}"     == "failure"   || \
            "${{ needs.checkstyle.result }}"     == "cancelled" || \
            "${{ needs.unit-test.result }}"      == "failure"   || \
            "${{ needs.unit-test.result }}"      == "cancelled" \
          ]]; then
            echo "ci_status=failure" >> $GITHUB_OUTPUT
          else
            echo "ci_status=success" >> $GITHUB_OUTPUT
          fi

      - name: Collect changed services
        id: services
        run: |
          SERVICES=""
          append() {
            [[ "$1" == "true" ]] && SERVICES="${SERVICES:+$SERVICES,}$2"
          }
          append "${{ needs.detect-changes.outputs.common }}"                   "common"
          append "${{ needs.detect-changes.outputs['api-gateway'] }}"           "api-gateway"
          append "${{ needs.detect-changes.outputs.delivery_manager_service }}" "delivery_manager_service"
          append "${{ needs.detect-changes.outputs['eureka-server'] }}"         "eureka-server"
          append "${{ needs.detect-changes.outputs['user-service'] }}"          "user-service"
          # <PLACEHOLDER> 새 서비스 추가 시 append 줄을 추가하세요.

          echo "list=${SERVICES:-none}" >> $GITHUB_OUTPUT

      - name: Send Discord notification
        if: always()
        shell: bash
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_DEV_WEBHOOK }}
          CI_STATUS:    ${{ steps.evaluate.outputs.ci_status }}
          CHANGED_SVCS: ${{ steps.services.outputs.list }}
          PR_TITLE:     ${{ github.event.pull_request.title }}
          PR_AUTHOR:    ${{ github.event.pull_request.user.login }}
          PR_URL:       ${{ github.event.pull_request.html_url }}
          RUN_URL:      ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          R_DETECT:     ${{ needs.detect-changes.result }}
          R_STYLE:      ${{ needs.checkstyle.result }}
          R_UNIT:       ${{ needs.unit-test.result }}
        run: |
          job_emoji() {
            case "$1" in
              success)   echo "✅" ;;
              failure)   echo "❌" ;;
              cancelled) echo "⚠️" ;;
              skipped)   echo "⏭️" ;;
              *)         echo "❓" ;;
            esac
          }

          [[ "$CI_STATUS" == "success" ]] \
            && COLOR=5763719 && TITLE="✅  CI Passed — Dev CI" \
            || COLOR=15548997 && TITLE="❌  CI Failed — Dev CI"

          if [[ -z "$CHANGED_SVCS" || "$CHANGED_SVCS" == "none" ]]; then
            SERVICE_LIST="변경된 서비스 없음"
          else
            SERVICE_LIST=$(echo "$CHANGED_SVCS" | tr ',' '\n' | sed 's/^/• /' | paste -sd '\n')
          fi

          FAILED_LINKS=""
          [[ "$R_DETECT" == "failure" ]] && FAILED_LINKS="${FAILED_LINKS}• [detect-changes 로그](${RUN_URL})\n"
          [[ "$R_STYLE"  == "failure" ]] && FAILED_LINKS="${FAILED_LINKS}• [checkstyle 로그](${RUN_URL})\n"
          [[ "$R_UNIT"   == "failure" ]] && FAILED_LINKS="${FAILED_LINKS}• [unit-test 로그](${RUN_URL})\n"

          if [[ -n "$FAILED_LINKS" ]]; then
            FAILED_FIELD=",{\"name\":\"🔗 실패한 Job 로그\",\"value\":\"${FAILED_LINKS}\",\"inline\":false}"
          else
            FAILED_FIELD=""
          fi

          PAYLOAD=$(cat <<EOF
          {
            "username": "GitHub Actions",
            "avatar_url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
            "embeds": [{
              "title": "${TITLE}",
              "url": "${RUN_URL}",
              "color": ${COLOR},
              "fields": [
                {"name":"📌 PR","value":"[${PR_TITLE}](${PR_URL})","inline":false},
                {"name":"👤 작성자","value":"${PR_AUTHOR}","inline":true},
                {"name":"🔀 대상 브랜치","value":"dev","inline":true},
                {"name":"📦 변경된 서비스","value":"${SERVICE_LIST}","inline":false},
                {"name":"📋 Job 결과","value":"$(job_emoji $R_DETECT) detect-changes\n$(job_emoji $R_STYLE) checkstyle\n$(job_emoji $R_UNIT) unit-test","inline":false}
                ${FAILED_FIELD}
              ],
              "footer":{"text":"Run #${{ github.run_number }} • ${{ github.repository }}"},
              "timestamp":"$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }]
          }
          EOF
          )

          HTTP_STATUS=$(curl -s -o /tmp/res.txt -w "%{http_code}" \
            -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          cat /tmp/res.txt
          [[ "$HTTP_STATUS" -ge 200 && "$HTTP_STATUS" -lt 300 ]] \
            && echo "디스코드 알림 완료" \
            || { echo "서버 에러로 디스코드에 전송하지 못했습니다."; exit 1; }

      - name: Final status check
        run: |
          [[ "${{ steps.evaluate.outputs.ci_status }}" == "success" ]] \
            && echo "CI SUCCESS" \
            || { echo "CI가 실패했습니다. 다시 코드를 확인해주세요."; exit 1; }