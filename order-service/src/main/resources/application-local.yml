eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:boxoffice-eureka}:8761/eureka/

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:sparta-logistics}?currentSchema=order_schema
    username: ${DB_USERNAME:sparta_admin}
    password: ${DB_PASSWORD:password123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:sparta-redis}
      port: 6379

app:
  cache:
    user-company-ttl: 3600
    order-ttl: 60
    order-search-ttl: 180
    user-info-ttl: 10

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics,info
  metrics:
    tags:
      application: order-service