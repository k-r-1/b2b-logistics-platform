spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:sparta-logistics}?currentSchema=order_schema
    username: ${DB_USERNAME:sparta_admin}
    password: ${DB_PASSWORD:password123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}   # ← 로컬에서는 localhost 사용
      port: 6379

# ── Eureka 비활성화 (로컬 단독 실행 시 503 방지) ──────────────────
eureka:
  client:
    register-with-eureka: false    # Eureka 서버에 등록하지 않음
    fetch-registry: false          # Eureka 서버에서 레지스트리를 가져오지 않음
    enabled: false                 # Eureka Client 전체 비활성화


app:
  cache:
    user-company-ttl: 3600
    order-ttl: 60
    user-info-ttl: 10

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics,info
  metrics:
    tags:
      application: order-service