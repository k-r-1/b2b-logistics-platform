server:
  port: 8087

spring:
  application:
    name: ai-notification-service

  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY:}
        chat:
          options:
            model: gemini-2.5-flash

  data:
    redis:
      host: ${REDIS_HOST:}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ai-notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.boxoffice.ainotificationservice.notification.consumer.event
        spring.json.use.type.headers: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  cloud:
    compatibility-verifier:
      enabled: false

  datasource:
    # 일단 단일 DB 환경 세팅이므로 동일 DB 사용
    url: jdbc:postgresql://localhost:5432/${DB_NAME:sparta_logistics}?currentSchema=notification_schema
    username: ${DB_USERNAME:sparta_admin}
    password: ${DB_PASSWORD:password123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # 개발 단계 update 사용
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: notification_schema

notification:
  slack:
    webhook-url: ${SLACK_WEBHOOK_URL:}
  dispatch:
    max-attempts: 3
  recovery:
    stale-after: PT5M
    interval-ms: 60000
