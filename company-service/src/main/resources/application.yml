server:
  port: 8082

spring:
  application:
    name: company-service

  cloud:
    compatibility-verifier:
      enabled: false
    openfeign:
      client:
        config:
          default:
            connect-timeout: 2000
            read-timeout: 3000
  datasource:
    url: jdbc:postgresql://localhost:5432/${DB_NAME:sparta_logistics}?currentSchema=company_schema
    username: ${DB_USERNAME:sparta_admin}
    password: ${DB_PASSWORD:password123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

feign:
  circuitbreaker:
    enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
