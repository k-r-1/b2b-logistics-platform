server:
  port: 8086

spring:
  application:
    name: delivery-manager-service

  # 1. MSA 보안 아키텍처
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8089/realms/boxoffice-realm

  cloud:
    compatibility-verifier:
      enabled: false

  # 2. PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5432/${DB_NAME:sparta_logistics}?currentSchema=delivery_manager_schema
    username: ${DB_USERNAME:sparta_admin}
    password: ${DB_PASSWORD:password123}
    driver-class-name: org.postgresql.Driver

  # 3. JPA 설정 최적화 (Spring Boot 3.x 기준)
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # 4. Redis
  data:
    redis:
      host: localhost
      port: 6379

# 5. Eureka 클라이언트 최적화
eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# 6. 🌟 로깅 최적화
logging:
  level:
    org.hibernate.orm.jdbc.bind: TRACE
    com.boxoffice.delivery_manager_service: DEBUG