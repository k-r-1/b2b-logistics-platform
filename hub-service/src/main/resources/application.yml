server:
  port: 8082

  spring:
    application:
      name: hub-service
    datasource:
      url: jdbc:postgresql://localhost:5432/hub_db
      username: postgres
      password: postgres
      driver-class-name: org.postgresql.Driver
    jpa:
      hibernate:
        ddl-auto: validate
      properties:
        hibernate:
          default_schema: public
          format_sql: true
    flyway:
      enabled: true
      locations: classpath:db/migration
    data:
      redis:
        host: localhost
        port: 6379

  eureka:
    client:
      service-url:
        defaultZone: http://localhost:8761/eureka/
    instance:
      prefer-ip-address: true

  hub:
    route:
      strategy: HUB_AND_SPOKE