server:
  port: 8083

spring:
  application:
    name: hub-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
       hibernate:
         default_schema: public
         format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  Kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: hub-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.boxoffice.hubservice.stocktransfer.event"
        spring.json.type.mapping: >
          boxoffice.deliveryservice.kafka.event.TransferAssignSuccessEvent:com.boxoffice.hubservice.stocktransfer.event.AssignmentSucceededEvent,
          boxoffice.deliveryservice.kafka.event.TransferAssignFailedEvent:com.boxoffice.hubservice.stocktransfer.event.AssignmentFailedEvent
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  paths-to-exclude: /internal/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true